{% extends "admin/change_list.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<style>
.status-btn {
    padding: 4px 8px;
    margin: 0 2px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    font-weight: bold;
    transition: background-color 0.2s;
}

.confirm-btn {
    background-color: #28a745;
    color: white;
}

.confirm-btn:hover {
    background-color: #218838;
}

.hide-btn {
    background-color: #dc3545;
    color: white;
}

.hide-btn:hover {
    background-color: #c82333;
}

.status-btn:disabled {
    background-color: #6c757d;
    cursor: not-allowed;
}

.row-updating {
    opacity: 0.6;
    transition: opacity 0.5s;
}
</style>
{% endblock %}

{{ block.super }}
{% endblock %}
