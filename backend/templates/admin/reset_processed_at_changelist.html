{% extends "admin/change_list.html" %}
{% load admin_urls static admin_list %}

{% block object-tools-items %}
    <li>
        <a href="#"
           onclick="if (confirm('Set processed_at to null for the current filtered selection?')) { document.getElementById('reset-processed-at-form').submit(); } return false;"
           style="background-color: #ba2121; border-color: #ba2121;">
            Reset processed_at
        </a>
        <form id="reset-processed-at-form"
              method="post"
              action="{{ reset_processed_at_url }}"
              style="display:none;">
            {% csrf_token %}
        </form>
    </li>
    {{ block.super }}
{% endblock %}
